{% extends "base.html" %}

{% block title %}Login PRESSUREDLE{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/entername.css') }}">
{% endblock %}

{% block content %}
<div class="outerbox"> 
    <div class="textbox">
        <h1>PRESSUREDLE</h1>
    </div>
    <div class="container">
        <form method="POST" action="{{ url_for('auth.login') }}"> 
            <input type="text" name="username" placeholder="What is your name?" required /> 
            <button type="submit">Start Game</button>
        </form>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}
